version: "2"
type: frontend
tech_stack:
  - React
  - Vite
  - Zustand
  - Vanilla CSS Modules
  - Framer Motion
  - Recharts
routes:
  - path: /auth
    file: src/pages/Auth/AuthPage.jsx
    auth_required: false
    description: User login and registration
  - path: /dashboard
    file: src/pages/Dashboard/DashboardPage.jsx
    auth_required: true
    description: Main user dashboard showing daily tracker progress, XP bar, heatmap, chart
  - path: /shop
    file: src/pages/Shop/ShopPage.jsx
    auth_required: true
    description: Shop to redeem Aura Points for real-world rewards
  - path: /settings
    file: src/pages/Settings/SettingsPage.jsx
    auth_required: true
    description: App configuration, task management, profile
  - path: /leaderboard
    file: src/pages/Leaderboard/LeaderboardPage.jsx
    auth_required: true
    description: Leaderboard of users
  - path: /calendar
    file: src/pages/Calendar/CalendarPage.jsx
    auth_required: true
    description: Calendar view of past performance
features:
  - name: Authentication
    description: Login or register to access the tracker
    files:
      - src/pages/Auth/AuthPage.jsx
      - src/store/userStore.js
    entry_route: /auth
    user_interactions:
      - Enter email and password
      - Click Access Terminal
      - Redirect to app upon success
    api_calls:
      - method: POST
        endpoint: Supabase Auth
    auth_required: false
  - name: Dashboard Progress
    description: Track daily stats, mark tasks complete, view dynamic progress bars
    files:
      - src/pages/Dashboard/DashboardPage.jsx
      - src/store/auraStore.js
      - src/store/taskStore.js
    entry_route: /dashboard
    user_interactions:
      - Click MARK DONE on daily tasks
      - See XP bar fill up
      - View heatmap updates
    auth_required: true
  - name: Shop Redemption
    description: Redeem accrued AP for rewards
    files:
      - src/pages/Shop/ShopPage.jsx
    entry_route: /shop
    user_interactions:
      - See AP balance
      - Click REDEEM on Amazon or Netflix card
    auth_required: true
known_limitations: []

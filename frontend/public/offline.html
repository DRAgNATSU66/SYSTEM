<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00BFFF" />
  <title>SYSTEM — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0c;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 400px; }
    h1 { font-size: 2rem; letter-spacing: 0.15em; margin-bottom: 1rem; color: #00BFFF; }
    p { color: #9e9e9e; font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #00BFFF; color: #0a0a0c; border: none; padding: 0.85rem 2rem;
      border-radius: 8px; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.1em;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>OFFLINE</h1>
    <p>Connection lost. SYSTEM requires network access to sync your data. Reconnect and try again.</p>
    <button onclick="window.location.reload()">RETRY CONNECTION</button>
  </div>
</body>
</html>
